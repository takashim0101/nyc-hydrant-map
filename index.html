<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Hydrant Density by Neighborhood</title>

    <!-- MapLibre GL JS -->
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.21.0/dist/maplibre-gl.js"></script>

    <!-- PMTiles protocol plugin — lets MapLibre read .pmtiles files directly -->
    <script src="https://cdn.jsdelivr.net/npm/pmtiles@4.4.0/dist/pmtiles.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* --- Legend --- */
        #legend {
            position: absolute;
            bottom: 30px;
            left: 10px;
            background: white;
            padding: 12px 14px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            font-size: 13px;
            z-index: 1;
        }
        #legend h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            font-weight: 600;
        }
        .legend-row {
            display: flex;
            align-items: center;
            margin-bottom: 3px;
        }
        .legend-color {
            width: 20px;
            height: 14px;
            margin-right: 8px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* --- Info panel --- */
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px 14px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            font-size: 13px;
            z-index: 1;
            max-width: 280px;
        }
        #info h3 {
            margin: 0 0 4px 0;
            font-size: 15px;
        }
        #info p {
            margin: 0;
            color: #555;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Info panel -->
<div id="info">
    <h3>NYC Hydrant Density</h3>
    <p>Fire hydrants per km² by neighborhood. Click a neighborhood for details.</p>
</div>

<!-- Legend -->
<div id="legend">
    <h4>Hydrants per km²</h4>
    <div class="legend-row"><div class="legend-color" style="background:#ffffcc"></div> &lt; 100</div>
    <div class="legend-row"><div class="legend-color" style="background:#fed976"></div> 100 – 150</div>
    <div class="legend-row"><div class="legend-color" style="background:#fd8d3c"></div> 150 – 200</div>
    <div class="legend-row"><div class="legend-color" style="background:#e31a1c"></div> 200 – 300</div>
    <div class="legend-row"><div class="legend-color" style="background:#800026"></div> 300+</div>
</div>

<script>
    // ── Register the PMTiles protocol so MapLibre can read .pmtiles URLs ──
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    // ── Create the map ────────────────────────────────────────────────────
    const map = new maplibregl.Map({
        container: 'map',
        // Free basemap from Protomaps — no API key needed
        style: {
            version: 8,
            glyphs: 'https://cdn.protomaps.com/fonts/pbf/{fontstack}/{range}.pbf',
            sources: {
                'basemap': {
                    type: 'raster',
                    tiles: [
                        'https://a.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}.png'
                    ],
                    tileSize: 256,
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }
            },
            layers: [{
                id: 'basemap-tiles',
                type: 'raster',
                source: 'basemap',
                minzoom: 0,
                maxzoom: 19
            }]
        },
        center: [-73.95, 40.72],  // NYC center
        zoom: 10.5,
        maxZoom: 14,
        minZoom: 8
    });

    window.map = map;
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // ── Add the PMTiles source and layers when the map loads ──────────────
    map.on('load', () => {
        map.addSource('density', {
            type: 'vector',
            url: 'pmtiles://./neighborhood_density.pmtiles'
        });

        // Choropleth fill layer — YlOrRd color ramp matching the legend
        map.addLayer({
            id: 'density-fill',
            type: 'fill',
            source: 'density',
            'source-layer': 'neighborhood_density',
            paint: {
                'fill-color': [
                    'step',
                    ['get', 'hydrants_per_km2'],
                    '#ffffcc',   // < 100: pale yellow
                    100, '#fed976',  // 100-150: yellow
                    150, '#fd8d3c',  // 150-200: orange
                    200, '#e31a1c',  // 200-300: red
                    300, '#800026'   // 300+: dark red
                ],
                'fill-opacity': 0.7
            }
        });

        // Outline layer for neighborhood boundaries
        map.addLayer({
            id: 'density-outline',
            type: 'line',
            source: 'density',
            'source-layer': 'neighborhood_density',
            paint: {
                'line-color': '#333',
                'line-width': 0.5,
                'line-opacity': 0.6
            }
        });

        // Highlight layer — invisible until a feature is hovered
        map.addLayer({
            id: 'density-highlight',
            type: 'line',
            source: 'density',
            'source-layer': 'neighborhood_density',
            paint: {
                'line-color': '#000',
                'line-width': 2.5
            },
            filter: ['==', 'ntaname', '']  // matches nothing initially
        });
    });

    // ── Click handler — show popup with neighborhood details ──────────────
    map.on('click', 'density-fill', (e) => {
        if (!e.features || e.features.length === 0) return;

        const f = e.features[0].properties;
        const html = `
            <strong>${f.ntaname}</strong><br>
            ${f.boroname}<br>
            <hr style="margin:4px 0;border:none;border-top:1px solid #ddd">
            Hydrants: <strong>${f.hydrant_count}</strong><br>
            Area: ${f.area_km2} km²<br>
            Density: <strong>${f.hydrants_per_km2} / km²</strong>
        `;

        new maplibregl.Popup({ maxWidth: '240px' })
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);
    });

    // ── Hover effect — highlight the neighborhood under the cursor ────────
    map.on('mousemove', 'density-fill', (e) => {
        map.getCanvas().style.cursor = 'pointer';
        if (e.features && e.features.length > 0) {
            map.setFilter('density-highlight', [
                '==', 'ntaname', e.features[0].properties.ntaname
            ]);
        }
    });

    map.on('mouseleave', 'density-fill', () => {
        map.getCanvas().style.cursor = '';
        map.setFilter('density-highlight', ['==', 'ntaname', '']);
    });
</script>

</body>
</html>
